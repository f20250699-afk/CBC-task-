<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KALAM | Welfare Eligibility System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #07090e;
      --card-bg: rgba(17, 24, 39, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      
      --status-qualified: #10b981;
      --status-disqualified: #ef4444;
      --status-ambiguous: #8b5cf6;
      --status-blocked: #f59e0b;
      --status-verification: #3b82f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.05), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.05), transparent 40%);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(7, 9, 14, 0.8);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 50;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.2rem;
      color: white;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
    }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .mode-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.03);
      padding: 0.4rem 0.8rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px #10b981;
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 360px 1fr 400px;
      gap: 1.5rem;
      padding: 1.5rem;
      min-height: 0;
    }

    /* Panels Configuration */
    .panel {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .panel-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--text-primary);
    }

    .panel-header span {
      opacity: 0.6;
    }

    /* ---------------- Panel 1: Chat ---------------- */
    #chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .message {
      max-width: 85%;
      padding: 0.875rem 1rem;
      border-radius: 1rem;
      font-size: 0.9rem;
      line-height: 1.5;
      position: relative;
      animation: messageIn 0.3s ease-out;
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-bot {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-bottom-left-radius: 0.25rem;
    }

    .message-user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 0.25rem;
    }

    .input-area {
      padding: 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
    }

    .chat-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.75rem 1rem;
      color: white;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }

    .chat-input:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.06);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 0.75rem;
      background: var(--accent);
      border: none;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover {
      transform: scale(1.05);
      background: #2563eb;
    }

    /* ---------------- Panel 2: Results ---------------- */
    #schemes-grid {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      align-content: start;
    }

    .scheme-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 1.25rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      cursor: pointer;
    }

    .scheme-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-4px);
    }

    .scheme-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .scheme-id {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .scheme-status {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      padding: 0.25rem 0.6rem;
      border-radius: 9999px;
    }

    .status-qualified { color: #10b981; background: rgba(16, 185, 129, 0.1); }
    .status-disqualified { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
    .status-ambiguous { color: #8b5cf6; background: rgba(139, 92, 246, 0.1); }
    .status-blocked { color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
    .status-verification { color: #3b82f6; background: rgba(59, 130, 246, 0.1); }

    .scheme-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
    }

    .scheme-ministry {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .conf-container {
      margin-top: auto;
    }

    .conf-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      margin-bottom: 0.4rem;
    }

    .conf-label { color: var(--text-secondary); }
    .conf-value { font-weight: 600; }

    .conf-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
    }

    .conf-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s ease-out;
    }

    /* ---------------- Panel 3: Profile ---------------- */
    #profile-data {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
    }

    .data-key {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .data-value {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .data-value.none {
      font-weight: 400;
      font-style: italic;
      opacity: 0.3;
    }

    .ambiguity-section {
      margin-top: auto;
      padding: 1.25rem;
      border-top: 1px solid var(--border);
      background: rgba(139, 92, 246, 0.05);
    }

    .ambiguity-header {
      font-size: 0.75rem;
      font-weight: 800;
      color: #a78bfa;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .ambiguity-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .ambiguity-item {
      font-size: 0.8rem;
      line-height: 1.4;
      color: #c4b5fd;
      background: rgba(139, 92, 246, 0.1);
      padding: 0.6rem;
      border-radius: 0.5rem;
      border-left: 3px solid #8b5cf6;
    }

    /* ---------------- Modal ---------------- */
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-content {
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .modal-section { margin-bottom: 1.5rem; }
    .modal-label { font-weight: 700; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; }
    .modal-text { font-size: 0.95rem; line-height: 1.6; color: var(--text-primary); }

    .audit-step {
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 0.75rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }

    .audit-pass { border-left: 3px solid #10b981; }
    .audit-fail { border-left: 3px solid #ef4444; }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

    @media (max-width: 1200px) {
      main { grid-template-columns: 320px 1fr; }
      .panel:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo-icon">K</div>
      <div class="logo-text">Kalam Welfare</div>
    </div>
    <div class="mode-indicator">
      <div class="status-dot"></div>
      DETERMINISTIC RULES ENGINE ACTIVATED
    </div>
  </header>

  <main>
    <!-- Left: Conversational UI -->
    <section class="panel">
      <div class="panel-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        Hinglish NLU <span>Assistant</span>
      </div>
      <div id="chat-scroll">
        <!-- Messages go here -->
      </div>
      <div class="input-area">
        <input type="text" id="chat-input" class="chat-input" placeholder="Type profile details..." autocomplete="off">
        <button id="send-btn" class="send-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </section>

    <!-- Center: Matching Engine -->
    <section class="panel">
      <div class="panel-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Scheme Eligibility <span>Real-time Evaluation</span>
      </div>
      <div id="schemes-grid">
        <!-- Scheme cards go here -->
      </div>
    </section>

    <!-- Right: Extracted State -->
    <section class="panel">
      <div class="panel-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        NLU Slot Metadata <span>JSON Profile</span>
      </div>
      <div id="profile-data">
        <!-- Profile rows go here -->
      </div>
      <div id="ambiguity-panel" class="ambiguity-section" style="display:none;">
        <div class="ambiguity-header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          ACTIVE AMBIGUITY FLAGS
        </div>
        <div id="ambiguity-list" class="ambiguity-list"></div>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div id="modal-overlay">
    <div class="modal-content">
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    // ---------------- Configuration & Logic ---------------- //
    
    // Core User State
    let userProfile = {
      name: null,
      occupation: null,
      state: null,
      age: null,
      land_ownership_status: null, // owner, joint_owner, lessee
      bank_account_linked_aadhaar: null,
      income_tax_payer: null,
      residence_type: null, // rural, urban
      marital_status: null, // widow, married, single
      remarried: null,
      secc_2011_listed: null,
      housing_status: null, // houseless, kaccha_house, pucca_house,
      annual_household_income: null
    };

    const SCHEMES = [
      {
        id: "S01",
        name: "PM-KISAN",
        ministry: "Agriculture",
        benefit: "Rs. 6000/year",
        rules: {
          hard: [
            { field: "occupation", op: "eq", val: "farmer", msg: "Occupation must be farmer" },
            { field: "land_ownership_status", op: "in", val: ["owner", "joint_owner"], msg: "Must be a landowner" }
          ],
          exclusions: [
            { field: "income_tax_payer", op: "eq", val: true, msg: "Income tax payers are excluded" }
          ],
          ambiguities: ["A01_LESSEE_FARMER"]
        }
      },
      {
        id: "S02",
        name: "MGNREGA",
        ministry: "Rural Development",
        benefit: "100 Job Days",
        rules: {
          hard: [
            { field: "residence_type", op: "eq", val: "rural", msg: "Rural area only" },
            { field: "age", op: "gte", val: 18, msg: "Must be 18+" }
          ],
          exclusions: [
            { field: "residence_type", op: "eq", val: "urban", msg: "Urban areas excluded" }
          ],
          ambiguities: []
        }
      },
      {
        id: "S03",
        name: "PMJAY",
        ministry: "Health",
        benefit: "Rs. 5L Insurance",
        rules: {
          hard: [
            { field: "secc_2011_listed", op: "eq", val: true, msg: "Must be in SECC list" }
          ],
          exclusions: [],
          ambiguities: ["A04_SECC_STALENESS"]
        }
      },
      {
        id: "S08",
        name: "IGNWPS (Widow)",
        ministry: "Rural Development",
        benefit: "Monthly Pension",
        rules: {
          hard: [
            { field: "age", op: "gte", val: 40, msg: "Age must be 40+" },
            { field: "marital_status", op: "eq", val: "widow", msg: "Status must be widow" }
          ],
          exclusions: [
            { field: "remarried", op: "eq", val: true, msg: "Remarriage terminates widow status" }
          ],
          ambiguities: ["A10_WIDOW_REMARRIAGE_STATUS"]
        }
      },
      {
        id: "S04",
        name: "PMAY-G",
        ministry: "Rural Development",
        benefit: "Housing Subsidy",
        rules: {
          hard: [
            { field: "residence_type", op: "eq", val: "rural", msg: "Rural only" },
            { field: "housing_status", op: "in", val: ["houseless", "kaccha_house"], msg: "Must not have pucca house" }
          ],
          exclusions: [
            { field: "housing_status", op: "eq", val: "pucca_house", msg: "Pucca house owners excluded" }
          ],
          ambiguities: []
        }
      }
    ];

    const AMBIGUITIES = {
      "A01_LESSEE_FARMER": "PM-KISAN rules for lessee farmers are state-dependent and formally ambiguous at center.",
      "A04_SECC_STALENESS": "SECC 2011 data is outdated; families who became poor after 2011 may be missed.",
      "A10_WIDOW_REMARRIAGE_STATUS": "Remarriage status is often not updated in government records, leading to irregular benefits.",
      "A12_AADHAAR_NO_BANK": "User has Aadhaar but no linked bank account, blocking DBT payments."
    };

    // ---------------- UI Engine ---------------- //

    function renderProfile() {
      const container = document.getElementById('profile-data');
      container.innerHTML = '';
      
      Object.entries(userProfile).forEach(([key, val]) => {
        const row = document.createElement('div');
        row.className = 'data-row';
        row.innerHTML = `
          <div class="data-key">${key.replace(/_/g, ' ')}</div>
          <div class="data-value ${val === null ? 'none' : ''}">${val === null ? 'not defined' : val}</div>
        `;
        container.appendChild(row);
      });

      // Update Ambiguities
      const activeAmbiguities = [];
      if (userProfile.land_ownership_status === "lessee") activeAmbiguities.push("A01_LESSEE_FARMER");
      if (userProfile.secc_2011_listed === null) activeAmbiguities.push("A04_SECC_STALENESS");
      if (userProfile.marital_status === "widow" && userProfile.remarried === null) activeAmbiguities.push("A10_WIDOW_REMARRIAGE_STATUS");
      
      const panel = document.getElementById('ambiguity-panel');
      const list = document.getElementById('ambiguity-list');
      if (activeAmbiguities.length > 0) {
        panel.style.display = 'block';
        list.innerHTML = activeAmbiguities.map(id => `<div class="ambiguity-item"><strong>${id}</strong>: ${AMBIGUITIES[id]}</div>`).join('');
      } else {
        panel.style.display = 'none';
      }
    }

    function evaluateScheme(scheme) {
      let status = "qualified";
      let conf = 1.0;
      let fails = [];
      let missing = [];
      let audit = [];

      // Check Exclusions First
      for (let exc of scheme.rules.exclusions) {
        let val = userProfile[exc.field];
        if (val === null) {
          audit.push({ field: exc.field, res: "unknown", msg: "Field undefined" });
          continue;
        }
        
        let match = false;
        if (exc.op === "eq") match = val === exc.val;
        
        if (match) {
          status = "disqualified";
          conf = 0.0;
          fails.push(exc.msg);
          audit.push({ field: exc.field, res: "fail", msg: exc.msg });
          break;
        } else {
          audit.push({ field: exc.field, res: "pass", msg: "Exclusion not triggered" });
        }
      }

      if (status !== "disqualified") {
        for (let cond of scheme.rules.hard) {
          let val = userProfile[cond.field];
          if (val === null) {
            status = "verification";
            missing.push(cond.field);
            conf -= 0.2;
            audit.push({ field: cond.field, res: "unknown", msg: "Value missing" });
            continue;
          }

          let match = false;
          if (cond.op === "eq") match = val === cond.val;
          if (cond.op === "gte") match = val >= cond.val;
          if (cond.op === "in") match = cond.val.includes(val);

          if (!match) {
            status = "disqualified";
            conf = 0.0;
            fails.push(cond.msg);
            audit.push({ field: cond.field, res: "fail", msg: cond.msg });
            break;
          } else {
            audit.push({ field: cond.field, res: "pass", msg: "Condition met" });
          }
        }
      }

      // Check Ambiguities
      let activeAmb = scheme.rules.ambiguities.filter(a => {
        if (a === "A01_LESSEE_FARMER" && userProfile.land_ownership_status === "lessee") return true;
        if (a === "A10_WIDOW_REMARRIAGE_STATUS" && userProfile.marital_status === "widow" && userProfile.remarried === null) return true;
        return false;
      });

      if (activeAmb.length > 0 && status !== "disqualified") {
        status = "ambiguous";
        conf = Math.min(conf, 0.4);
      }

      return { status, conf: Math.max(0, conf), fails, missing, audit };
    }

    function renderSchemes() {
      const grid = document.getElementById('schemes-grid');
      grid.innerHTML = '';

      SCHEMES.forEach(s => {
        const res = evaluateScheme(s);
        const card = document.createElement('div');
        card.className = 'scheme-card';
        card.onclick = () => showAudit(s, res);
        
        card.innerHTML = `
          <div class="scheme-card-header">
            <div class="scheme-id">${s.id}</div>
            <div class="scheme-status status-${res.status}">${res.status.replace('_', ' ')}</div>
          </div>
          <div class="scheme-name">${s.name}</div>
          <div class="scheme-ministry">${s.ministry} | ${s.benefit}</div>
          <div class="conf-container">
            <div class="conf-header">
              <div class="conf-label">Confidence Score</div>
              <div class="conf-value">${(res.conf * 100).toFixed(0)}%</div>
            </div>
            <div class="conf-track">
              <div class="conf-bar status-${res.status}" style="width: ${res.conf * 100}%; background: ${getStatusColor(res.status)}"></div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function getStatusColor(status) {
      switch(status) {
        case 'qualified': return '#10b981';
        case 'disqualified': return '#ef4444';
        case 'ambiguous': return '#8b5cf6';
        case 'blocked': return '#f59e0b';
        case 'verification': return '#3b82f6';
      }
    }

    function showAudit(scheme, res) {
      const modal = document.getElementById('modal-overlay');
      const body = document.getElementById('modal-body');
      
      let auditHtml = res.audit.map(a => `
        <div class="audit-step audit-${a.res}">
          <div style="font-weight:700; font-size: 0.7rem; opacity:0.6">${a.field.toUpperCase()}</div>
          <div>${a.msg}</div>
        </div>
      `).join('');

      body.innerHTML = `
        <div class="modal-title">
          <div class="logo-icon">${scheme.id.charAt(1)}</div>
          ${scheme.name} Detail
        </div>
        <div class="modal-section">
          <div class="modal-label">Ministry</div>
          <div class="modal-text">${scheme.ministry}</div>
        </div>
        <div class="modal-section">
          <div class="modal-label">Status</div>
          <div class="modal-text" style="color:${getStatusColor(res.status)}; font-weight:700">${res.status.toUpperCase()}</div>
        </div>
        ${res.fails.length > 0 ? `
          <div class="modal-section">
            <div class="modal-label">Disqualification Reasons</div>
            <ul style="color:#ef4444; font-size:0.9rem; padding-left:1rem">
              ${res.fails.map(f => `<li>${f}</li>`).join('')}
            </ul>
          </div>
        ` : ''}
        <div class="modal-section">
          <div class="modal-label">Deterministic Audit Trail</div>
          ${auditHtml}
        </div>
        <button onclick="document.getElementById('modal-overlay').style.display='none'" style="width:100%; padding:0.75rem; border-radius:0.75rem; background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; font-weight:600; cursor:pointer">Close Audit</button>
      `;

      modal.style.display = 'flex';
    }
    
    // ---------------- NLU & Proactivity logic ---------------- //

    const FIELD_QUESTIONS = {
      age: "Aapki umar (age) kya hai?",
      state: "Aap kis state se hain? (Bihar, Rajasthan, UP, etc.)",
      occupation: "Aap kya kaam karte hain? (Kisan, mazdoor, student, ya self-employed?)",
      residence_type: "Aap gaon (rural) mein rehte hain ya sheher (urban) mein?",
      marital_status: "Aapki marital status kya hai? (Married, single, ya widow?)",
      bank_account_linked_aadhaar: "Kya aapka bank account Aadhaar se linked hai?",
      land_ownership_status: "Kheti ke liye aapke paas apni zameen hai (owner) ya aap kiraye par (lessee) kheti karte hain?",
      housing_status: "Aapka ghar kaisa hai? (Kaccha, pucca, ya houseless?)",
      secc_2011_listed: "Kya aapka naam SECC 2011 list mein hai? (Agar PMJAY letter mila hai toh 'yes' bole)",
      annual_household_income: "Aapki saalana aamdani (annual income) kitni hai?"
    };

    function getNextQuestion() {
      // Prioritized order of questioning
      const priority = [
        'age', 'state', 'occupation', 'residence_type', 
        'marital_status', 'annual_household_income',
        'bank_account_linked_aadhaar', 'land_ownership_status', 
        'housing_status', 'secc_2011_listed'
      ];
      
      for (const field of priority) {
        if (userProfile[field] === null) {
          return FIELD_QUESTIONS[field];
        }
      }
      return null;
    }

    function addMessage(text, sender) {
      const scroll = document.getElementById('chat-scroll');
      const msg = document.createElement('div');
      msg.className = `message message-${sender}`;
      msg.innerText = text;
      scroll.appendChild(msg);
      scroll.scrollTop = scroll.scrollHeight;
    }

    function processInput(input) {
      const text = input.toLowerCase().trim();
      if (!text) return;
      
      // Handle Reset
      if (text.includes("reset") || text.includes("shuru se") || text.includes("restart")) {
        Object.keys(userProfile).forEach(k => userProfile[k] = null);
        renderProfile();
        renderSchemes();
        setTimeout(() => addMessage("Theek hai, maine profile reset kar di hai. Namaste! Kripya apna age aur kaam batayein.", 'bot'), 400);
        return;
      }

      let response = "";
      let specificResponse = false;
      let extractedFields = [];

      // Mock NLU Patterns (More robust)
      
      // 1. Name Extraction
      const nameMatch = text.match(/(?:mera naam|my name is|i am|main)\s+([a-z]{3,})/i); // Min 3 chars for name
      const nonNames = ["the", "from", "working", "employed", "self", "farmer", "student", "laborer", "kisan", "mazdoor", "ready", "here"];
      if (nameMatch && !nonNames.includes(nameMatch[1].toLowerCase())) {
        // Only update name if not already set, or if it's a clear name change
        if (!userProfile.name || text.includes("mera naam") || text.includes("my name is")) {
          userProfile.name = nameMatch[1];
          extractedFields.push("Name");
        }
      }

      // 2. Occupation Extraction
      if (text.includes("farmer") || text.includes("kisan") || text.includes("kheti")) { userProfile.occupation = "farmer"; extractedFields.push("Occupation"); }
      if (text.includes("student") || text.includes("padhai")) { userProfile.occupation = "student"; extractedFields.push("Occupation"); }
      if (text.includes("mazdoor") || text.includes("labor") || text.includes("coolie")) { userProfile.occupation = "laborer"; extractedFields.push("Occupation"); }
      if (text.includes("self employed") || text.includes("self-employed") || text.includes("apna kaam") || text.includes("khud ka kaam") || text.includes("business") || text.includes("dukan") || text.includes("shop") || text.includes("trader")) { userProfile.occupation = "self-employed"; extractedFields.push("Occupation"); }
      
      if (text.includes("rajasthan")) { userProfile.state = "Rajasthan"; extractedFields.push("State"); }
      if (text.includes("bihar")) { userProfile.state = "Bihar"; extractedFields.push("State"); }
      if (text.match(/\bup\b/) || text.includes("uttar pradesh")) { userProfile.state = "UP"; extractedFields.push("State"); }
      if (text.includes("jharkhand")) { userProfile.state = "Jharkhand"; extractedFields.push("State"); }
      
      if (text.includes("widow") || text.includes("vidhwa")) { userProfile.marital_status = "widow"; extractedFields.push("Marital Status"); }
      if (text.includes("married") || text.includes("shadi shuda")) { userProfile.marital_status = "married"; extractedFields.push("Marital Status"); }
      if (text.includes("single") || text.includes("kunwara") || text.includes("unmarried")) { userProfile.marital_status = "single"; extractedFields.push("Marital Status"); }
      
      // Boolean: Remarried
      if (text.includes("remarried") || text.includes("phir se shaadi")) {
        const isNegative = text.includes("nahi") || text.includes("nahin") || text.includes("no") || text.includes("never");
        userProfile.remarried = !isNegative;
        extractedFields.push("Remarriage Status");
      }
      
      const ageMatch = text.match(/(\d+)\s*(is\s*)?(year|yr|saal|age|umar|old)/) || text.match(/(age|umar|old|saal)\s*(is\s*)?(\d+)/);
      if (ageMatch) {
        let nums = ageMatch[0].match(/\d+/);
        if (nums) {
          userProfile.age = parseInt(nums[0]);
          extractedFields.push("Age");
        }
      }

      const incomeMatch = text.match(/(\d+[,000]*)\s*(is\s*)?(income|salary|kamata|aamdani|rupees|rs|₹)/) || text.match(/(income|salary|aamdani|kamai)\s*(is\s*|[:=-]\s*)?(\d+[,000]*)/);
      if (incomeMatch) {
        let nums = incomeMatch[0].match(/\d+/g);
        if (nums) {
          userProfile.annual_household_income = parseInt(nums[nums.length-1].replace(/,/g, ''));
          extractedFields.push("Income");
        }
      }

      // Lakh/K notation support
      const lakhMatch = text.match(/(\d+(\.\d+)?)\s*lakh/);
      if (lakhMatch) {
        userProfile.annual_household_income = parseFloat(lakhMatch[1]) * 100000;
        extractedFields.push("Income (Lakh)");
      }
      const kMatch = text.match(/(\d+)\s*k\b/);
      if (kMatch && !extractedFields.includes("Age")) {
        userProfile.annual_household_income = parseInt(kMatch[1]) * 1000;
        extractedFields.push("Income (K)");
      }

      // Smart Heuristic for raw numbers (if not caught by explicit keywords)
      if (!extractedFields.includes("Age") && !extractedFields.includes("Income") && !extractedFields.includes("Income (Lakh)")) {
        const rawNums = text.match(/\b\d+([,000]*)\b/g);
        if (rawNums) {
          rawNums.forEach(n => {
            let val = parseInt(n.replace(/,/g, ''));
            if (val > 120 && userProfile.annual_household_income === null) {
              userProfile.annual_household_income = val;
              extractedFields.push("Income (Heuristic)");
            } else if (val <= 120 && userProfile.age === null) {
              userProfile.age = val;
              extractedFields.push("Age (Heuristic)");
            }
          });
        }
      }

      if (text.includes("rural") || text.includes("gaon")) { userProfile.residence_type = "rural"; extractedFields.push("Residence"); }
      if (text.includes("urban") || text.includes("seher") || text.includes("city")) { userProfile.residence_type = "urban"; extractedFields.push("Residence"); }
      
      if (text.includes("lessee") || text.includes("kiraya") || text.includes("sharecropper") || text.includes("rented land")) { userProfile.land_ownership_status = "lessee"; extractedFields.push("Land Status"); }
      if (text.includes("owner") || text.includes("malik") || text.includes("apni zameen") || text.includes("own land")) { userProfile.land_ownership_status = "owner"; extractedFields.push("Land Status"); }
      
      if (text.includes("kaccha")) { userProfile.housing_status = "kaccha_house"; extractedFields.push("Housing"); }
      if (text.includes("pucca")) { userProfile.housing_status = "pucca_house"; extractedFields.push("Housing"); }
      if (text.includes("houseless") || text.includes("ghar nahi")) { userProfile.housing_status = "houseless"; extractedFields.push("Housing"); }
      
      // Boolean: SECC Listing
      if (text.includes("secc") || text.includes("pmjay card") || text.includes("ayushman list") || text.includes("ayushman letter")) {
        const isNegative = text.includes("nahi") || text.includes("nahin") || text.includes("no") || text.includes("not in") || text.includes("don't");
        userProfile.secc_2011_listed = !isNegative;
        extractedFields.push("SECC Status");
      }

      // Boolean: Aadhaar Bank Linking (DBT)
      if (text.includes("aadhaar") || text.includes("bank") || text.includes("account") || text.includes("dbt")) {
        if (text.includes("link") || text.includes("juda") || text.includes("connect")) {
          const isNegative = text.includes("nahi") || text.includes("nahin") || text.includes("no") || text.includes("not") || text.includes("unlinked");
          userProfile.bank_account_linked_aadhaar = !isNegative;
          extractedFields.push("Banking");
        }
      }

      // Boolean: Income Tax Payer
      if (text.includes("tax") || text.includes("income tax") || text.includes("taxpayer")) {
        const isNegative = text.includes("nahi") || text.includes("nahin") || text.includes("no") || text.includes("never") || text.includes("don't");
        if (text.includes("payer") || text.includes("bharta") || text.includes("pay") || text.includes("fill") || text.includes("tax") ) {
          userProfile.income_tax_payer = !isNegative;
          extractedFields.push("Tax Status");
        }
      }

      // Response logic
      const userName = userProfile.name ? (userProfile.name.charAt(0).toUpperCase() + userProfile.name.slice(1)) : "";
      const salute = userName ? `${userName} ji, ` : "";

      if (extractedFields.length > 0) {
        response = `${salute}Samajh gaya. Maine apki details (${extractedFields.join(", ")}) update kar di hain. `;
      } else {
        response = `${salute}Maaf kijiye, main ye samajh nahi paaya. Kya aap age, state, ya apne kaam ke baare mein bata sakte hain? `;
      }

      // Handle specific Edge Cases (EC-01, EC-02)
      if (text.includes("savitri") || (userProfile.marital_status === "widow" && userProfile.remarried === true)) {
        response = "Savitri ji, aapka profile update kar diya gaya hai. Kyunki aapne remarriage disclose ki hai, Widow Pension (IGNWPS) ineligible ho gayi hai. Rules ke mutabiq remarriage par status khatam ho jata hai. ";
        specificResponse = true;
      } else if (text.includes("ramesh") || (userProfile.land_ownership_status === "lessee" && userProfile.occupation === "farmer")) {
        response = "Ramesh ji, Bihar ka profile set hai. Aap 'lessee' farmer hain, isliye PM-KISAN par ambiguity flag hai. Bihar mein lessees ke liye rules center level par unclear hain. ";
        specificResponse = true;
      }

      const nextQ = getNextQuestion();
      if (nextQ) {
        if (specificResponse) {
          response += "\n\nAgla sawal: " + nextQ;
        } else {
          response += nextQ;
        }
      } else {
        // FINAL SUMMARY LOGIC
        const qualified = SCHEMES.filter(s => evaluateScheme(s).status === "qualified");
        const verification = SCHEMES.filter(s => evaluateScheme(s).status === "verification");
        
        response = "Dhanyawad! Saari jaankari mil gayi hai. Aapka eligibility summary yahan hai:\n\n";
        
        if (qualified.length > 0) {
          response += "✅ QUALIFIED SCHEMES:\n" + qualified.map(s => `• ${s.name} (${s.benefit})`).join("\n") + "\n\n";
        }
        
        if (verification.length > 0) {
          response += "🔍 REQUIRES VERIFICATION:\n" + verification.map(s => `• ${s.name} (Need documents/SECC)`).join("\n") + "\n\n";
        }
        
        response += "Aap kisi bhi scheme card par click karke deterministic audit trail dekh sakte hain. Kripya apne nazdeeki CSC centre jayein apply karne ke liye.";
      }

      renderProfile();
      renderSchemes();
      setTimeout(() => addMessage(response, 'bot'), 600);
    }

    document.getElementById('send-btn').onclick = () => {
      const input = document.getElementById('chat-input');
      if (input.value) {
        addMessage(input.value, 'user');
        processInput(input.value);
        input.value = '';
      }
    };

    document.getElementById('chat-input').onkeypress = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('send-btn').click();
      }
    };

    // Initialize
    window.onload = () => {
      addMessage("Namaste! Main Kalam Assistant hoon. Aap apne eligibility ke baare mein puch sakte hain. (Try: 'I am Savitri, 52yr widow from Rajasthan, but recently remarried')", "bot");
      renderProfile();
      renderSchemes();
    };

  </script>
</body>
</html>
